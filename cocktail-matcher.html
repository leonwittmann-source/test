<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cocktail Matcher</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#FF6B4A;--coral-dk:#C4503A;--coral-lt:#FF8E72;
  --cream:#FFF8F0;--bg:#FEF6EE;--bg2:#FFF0E4;--card:#FFFFFF;
  --text:#2D1B0E;--text2:#6B4030;--text3:#9B7060;
  --border:#F0D8C8;
  --shadow:0 2px 12px rgba(180,80,40,.10);
  --shadow-lg:0 8px 32px rgba(180,80,40,.18);
  --r:16px;--r-sm:10px;
  --grad:linear-gradient(135deg,#FF8E72 0%,#FF6B4A 50%,#C4503A 100%);
  --t:.25s cubic-bezier(.4,0,.2,1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{background:var(--grad);padding:2rem 1.5rem 1.5rem;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(255,255,255,.15) 0%,transparent 60%);pointer-events:none}
.header h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;color:#fff;letter-spacing:-.02em;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.header p{color:rgba(255,255,255,.85);margin-top:.4rem;font-size:1rem}

/* LAYOUT */
.container{max-width:1200px;margin:0 auto;padding:1.5rem 1rem}
.layout{display:grid;grid-template-columns:360px 1fr;gap:1.5rem;align-items:start}
@media(max-width:800px){.layout{grid-template-columns:1fr}}

/* PANEL */
.panel{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:1.5rem;border:1px solid var(--border)}
.panel-title{font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:1.2rem}

/* SLIDERS */
.sliders-grid{display:flex;flex-direction:column;gap:1rem}
.slider-row{display:flex;flex-direction:column;gap:.35rem}
.slider-header{display:flex;justify-content:space-between;align-items:center}
.slider-label{font-size:.875rem;font-weight:600;color:var(--text)}
.slider-sublabels{display:flex;justify-content:space-between;font-size:.68rem;color:var(--text3);margin-top:.1rem}
.slider-value{font-size:.8rem;font-weight:700;color:var(--coral);min-width:28px;text-align:right}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:999px;outline:none;cursor:pointer;
  background:linear-gradient(to right,var(--coral) 0%,var(--coral) var(--val,50%),var(--border) var(--val,50%),var(--border) 100%);
  transition:background var(--t)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--coral);border:3px solid #fff;box-shadow:0 2px 8px rgba(200,80,40,.3);transition:transform var(--t),box-shadow var(--t)}
input[type=range]:hover::-webkit-slider-thumb,input[type=range]:active::-webkit-slider-thumb{transform:scale(1.2);box-shadow:0 4px 16px rgba(200,80,40,.45)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--coral);border:3px solid #fff;box-shadow:0 2px 8px rgba(200,80,40,.3);cursor:pointer}

/* FILTERS */
.filter-section{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.filter-title{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem}
.tag-group{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem}
.tag{padding:.28rem .65rem;border-radius:999px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-size:.76rem;font-weight:600;cursor:pointer;transition:all var(--t);user-select:none}
.tag:hover{border-color:var(--coral-lt);color:var(--coral)}
.tag.active{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(200,80,40,.25)}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0}
.toggle-label{font-size:.875rem;font-weight:600;color:var(--text)}
.toggle{position:relative;width:42px;height:24px;cursor:pointer;display:inline-block}
.toggle input{display:none}
.toggle-track{width:42px;height:24px;border-radius:999px;background:var(--border);transition:background var(--t);position:relative}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform var(--t)}
.toggle input:checked+.toggle-track{background:var(--coral)}
.toggle input:checked+.toggle-track .toggle-thumb{transform:translateX(18px)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.7rem 1.4rem;border-radius:999px;font-weight:700;font-size:.9rem;cursor:pointer;border:none;transition:all var(--t)}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 16px rgba(200,80,40,.3);width:100%;margin-top:1.2rem;padding:.85rem;font-size:1rem}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,80,40,.4)}
.btn-ghost{background:transparent;color:var(--text3);border:1.5px solid var(--border);font-size:.8rem;padding:.45rem .9rem}
.btn-ghost:hover{border-color:var(--coral-lt);color:var(--coral)}
.btn-row{display:flex;justify-content:center;margin-top:.6rem}

/* TOP MATCH CARD */
.top-match-card{background:var(--grad);border-radius:var(--r);padding:1.8rem;position:relative;overflow:hidden;box-shadow:var(--shadow-lg);margin-bottom:1rem;animation:fadeIn .4s ease}
.top-match-card::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.1);pointer-events:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.top-badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(255,255,255,.2);padding:.22rem .65rem;border-radius:999px;font-size:.7rem;font-weight:700;color:#fff;letter-spacing:.05em;margin-bottom:.9rem}
.top-inner{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.top-name{font-size:clamp(1.5rem,4vw,2.1rem);font-weight:800;color:#fff;line-height:1.1;margin-bottom:.3rem}
.top-meta{margin-top:.75rem;display:flex;gap:.4rem;flex-wrap:wrap}
.meta-chip{background:rgba(255,255,255,.18);border-radius:999px;padding:.22rem .6rem;font-size:.72rem;font-weight:600;color:#fff}
.top-desc{color:rgba(255,255,255,.85);font-size:.88rem;line-height:1.55;margin-top:.8rem}
.match-pct-big{font-size:3.2rem;font-weight:900;color:#fff;line-height:1;text-align:right}
.match-pct-label{font-size:.75rem;color:rgba(255,255,255,.7);font-weight:600;text-align:right;margin-top:.1rem}
.match-bar-track{height:4px;background:rgba(255,255,255,.25);border-radius:999px;overflow:hidden;margin-top:.5rem;min-width:80px}
.match-bar-fill{height:100%;background:rgba(255,255,255,.85);border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* DETAIL CARD */
.detail-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:1rem;box-shadow:var(--shadow)}
.detail-tabs{display:flex;border-bottom:1px solid var(--border)}
.detail-tab{flex:1;padding:.75rem;font-size:.82rem;font-weight:700;text-align:center;cursor:pointer;color:var(--text3);transition:all var(--t);border-bottom:2.5px solid transparent}
.detail-tab.active{color:var(--coral);border-bottom-color:var(--coral);background:rgba(255,107,74,.04)}
.detail-content{padding:1.2rem}
.ingredient-list{list-style:none;display:flex;flex-direction:column;gap:.45rem}
.ingredient-item{display:flex;justify-content:space-between;align-items:center;padding:.45rem .75rem;background:var(--bg);border-radius:var(--r-sm);font-size:.84rem}
.ingredient-name{font-weight:600;color:var(--text)}
.ingredient-amount{color:var(--coral);font-weight:700;font-size:.78rem}
.glass-garnish{margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--border);display:flex;gap:.8rem}
.gg-item{flex:1;background:var(--bg);padding:.55rem .75rem;border-radius:var(--r-sm)}
.gg-label{font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:.2rem}
.gg-val{font-size:.82rem;font-weight:600;color:var(--text)}
.steps-list{list-style:none;display:flex;flex-direction:column;gap:.6rem}
.step-item{display:flex;gap:.7rem;align-items:flex-start}
.step-num{min-width:24px;height:24px;border-radius:50%;background:var(--grad);color:#fff;font-size:.7rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:.84rem;color:var(--text);line-height:1.5}

/* ALTERNATIVES */
.alt-title{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.65rem}
.alt-grid{display:flex;flex-direction:column;gap:.45rem}
.alt-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:.8rem 1rem;cursor:pointer;display:flex;align-items:center;gap:.7rem;transition:all var(--t);animation:fadeIn .35s ease}
.alt-card:hover{border-color:var(--coral-lt);box-shadow:0 4px 16px rgba(200,80,40,.12);transform:translateX(3px)}
.alt-emoji{font-size:1.3rem}
.alt-info{flex:1;min-width:0}
.alt-name{font-weight:700;font-size:.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alt-sub{font-size:.72rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alt-pct{font-weight:800;font-size:1rem;color:var(--coral);white-space:nowrap;text-align:right}
.alt-pct-lbl{font-size:.63rem;color:var(--text3);text-align:right}

/* EMPTY */
.empty{text-align:center;padding:3rem 1.5rem;color:var(--text3)}
.empty-icon{font-size:3rem;margin-bottom:1rem}
.empty-title{font-weight:700;font-size:1.05rem;margin-bottom:.35rem;color:var(--text2)}
.empty-sub{font-size:.84rem}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}
::-webkit-scrollbar-thumb:hover{background:var(--coral-lt)}
</style>
</head>
<body>

<header class="header">
  <h1>🍹 Cocktail Matcher</h1>
  <p>Stelle dein Geschmacksprofil ein — wir finden deinen perfekten Cocktail</p>
</header>

<main class="container">
  <div class="layout">

    <!-- LEFT: Controls -->
    <aside>
      <div class="panel">
        <div class="panel-title">🎚 Dein Geschmacksprofil</div>
        <div class="sliders-grid" id="sliderContainer"></div>

        <div class="filter-section">
          <div class="filter-title">Basis-Spirituose</div>
          <div class="tag-group" id="spiritFilters"></div>
          <div class="filter-title" style="margin-top:.75rem">Anlass</div>
          <div class="tag-group" id="occasionFilters"></div>
          <div class="toggle-row" style="margin-top:.5rem">
            <span class="toggle-label">🍋 Nur alkoholfrei</span>
            <label class="toggle">
              <input type="checkbox" id="nonAlcoholicToggle"/>
              <div class="toggle-track"><div class="toggle-thumb"></div></div>
            </label>
          </div>
        </div>

        <button class="btn btn-primary" id="findBtn">🍸 Cocktail finden</button>
        <div class="btn-row">
          <button class="btn btn-ghost" id="resetBtn">↺ Zurücksetzen</button>
        </div>
      </div>
    </aside>

    <!-- RIGHT: Results -->
    <section id="resultsArea">
      <div class="empty" id="emptyState">
        <div class="empty-icon">🍸</div>
        <div class="empty-title">Bereit zum Mixen?</div>
        <div class="empty-sub">Stelle dein Geschmacksprofil ein — die Ergebnisse aktualisieren sich live.</div>
      </div>
      <div id="resultsContent" style="display:none"></div>
    </section>

  </div>
</main>

   glass:'Highball-Glas',garnish:'Gurkenscheibe, Minzzweig'},

/* =============================================================
   SLIDER CONFIG
============================================================= */
const SLIDERS = [
  {key:'sweetness',      label:'Süße',           left:'herb',       right:'süß'},
  {key:'acidity',        label:'Säure / Frische', left:'mild',       right:'spritzig-sauer'},
  {key:'bitterness',     label:'Bitterkeit',      left:'gar nicht',  right:'stark bitter'},
  {key:'alcoholStrength',label:'Alkoholstärke',   left:'leicht',     right:'stark'},
  {key:'fruitiness',     label:'Fruchtigkeit',    left:'neutral',    right:'sehr fruchtig'},
  {key:'herbSpice',      label:'Würze / Kräuter', left:'clean',      right:'würzig/herbal'},
];

const SPIRITS   = ['Gin','Rum','Vodka','Tequila','Whisky','Brandy','Sekt/Wein','Alkoholfrei'];
const OCCASIONS = ['Aperitif','Digestif','Sommer','Party'];

/* =============================================================
   STATE
============================================================= */
const S = {
  sliders:        {sweetness:50,acidity:50,bitterness:50,alcoholStrength:50,fruitiness:50,herbSpice:50},
  activeSpirits:  [],
  activeOccasions:[],
  nonAlcoholic:   false,
  selected:       null,   // id of cocktail shown in detail
  results:        [],
  tab:            'ingredients',
};

/* =============================================================
   MATCHING ALGORITHM
   Weighted Euclidean distance, converted to match percentage.
   match% = (1 - dist / maxDist) * 100
============================================================= */
const WEIGHTS = {sweetness:1.2,acidity:1.1,bitterness:1.1,alcoholStrength:1.0,fruitiness:1.0,herbSpice:0.9};
const MAX_DIST = Math.sqrt(Object.values(WEIGHTS).reduce((s,w)=>s+(100*w)**2,0));

function matchScore(user, cocktail) {
  let sq = 0;
  for (const k in WEIGHTS) {
    const d = (user[k] - cocktail.profile[k]) * WEIGHTS[k];
    sq += d*d;
  }
  return Math.round((1 - Math.sqrt(sq)/MAX_DIST)*100);
}

function computeResults() {
  let pool = DB;
  if (S.nonAlcoholic)            pool = pool.filter(c=>c.alcoholFree);
  if (S.activeSpirits.length)    pool = pool.filter(c=>S.activeSpirits.includes(c.base));
  if (S.activeOccasions.length)  pool = pool.filter(c=>c.occasion.some(o=>S.activeOccasions.includes(o)));
  return pool
    .map(c=>({...c, match:matchScore(S.sliders,c)}))
    .sort((a,b)=>b.match-a.match);
}

/* =============================================================
   RENDER – sliders
============================================================= */
function renderSliders() {
  document.getElementById('sliderContainer').innerHTML = SLIDERS.map(s=>{
    const v = S.sliders[s.key];
    return `<div class="slider-row">
      <div class="slider-header">
        <span class="slider-label">${s.label}</span>
        <span class="slider-value" id="sv-${s.key}">${v}</span>
      </div>
      <input type="range" min="0" max="100" value="${v}"
        style="--val:${v}%"
        data-key="${s.key}"
        oninput="onSlider(this)"/>
      <div class="slider-sublabels"><span>${s.left}</span><span>${s.right}</span></div>
    </div>`;
  }).join('');
}

/* =============================================================
   RENDER – filter tags
============================================================= */
function renderFilters() {
  document.getElementById('spiritFilters').innerHTML =
    SPIRITS.map(sp=>`<span class="tag${S.activeSpirits.includes(sp)?' active':''}" onclick="toggleSpirit('${sp}')">${sp}</span>`).join('');
  document.getElementById('occasionFilters').innerHTML =
    OCCASIONS.map(o=>`<span class="tag${S.activeOccasions.includes(o)?' active':''}" onclick="toggleOccasion('${o}')">${o}</span>`).join('');
}

/* =============================================================
   RENDER – results
============================================================= */
function renderResults() {
  const res  = S.results;
  const el   = document.getElementById('resultsContent');
  const empty= document.getElementById('emptyState');

  if (!res.length) {
    el.style.display='none';
    empty.style.display='';
    empty.innerHTML=`<div class="empty-icon">🔍</div>
      <div class="empty-title">Keine Treffer</div>
      <div class="empty-sub">Passe deine Filter an oder setze sie zurück.</div>`;
    return;
  }

  empty.style.display='none';
  el.style.display='';

  const top  = res.find(c=>c.id===S.selected) || res[0];
  const alts = res.filter(c=>c.id!==top.id).slice(0,4);

  el.innerHTML = `
    <div class="top-match-card">
      <div class="top-badge">⭐ BESTER TREFFER</div>
      <div class="top-inner">
        <div>
          <div class="top-name">${top.emoji} ${top.name}</div>
          <div class="top-meta">
            <span class="meta-chip">🥃 ${top.base}</span>
            ${top.occasion.map(o=>`<span class="meta-chip">${o}</span>`).join('')}
            ${top.alcoholFree?'<span class="meta-chip">🍋 Alkoholfrei</span>':''}
          </div>
        </div>
        <div>
          <div class="match-pct-big" id="matchBig">${top.match}%</div>
          <div class="match-pct-label">Match</div>
          <div class="match-bar-track">
            <div class="match-bar-fill" id="matchBar" style="width:${top.match}%"></div>
          </div>
        </div>
      </div>
      <div class="top-desc">${top.description}</div>
    </div>

    <div class="detail-card">
      <div class="detail-tabs">
        <div class="detail-tab${S.tab==='ingredients'?' active':''}" onclick="switchTab('ingredients')">🧪 Zutaten</div>
        <div class="detail-tab${S.tab==='steps'?' active':''}" onclick="switchTab('steps')">📋 Zubereitung</div>
      </div>
      <div class="detail-content">
        ${S.tab==='ingredients' ? renderIngredients(top) : renderSteps(top)}
      </div>
    </div>

    ${alts.length?`
    <div class="alt-title">Weitere Empfehlungen</div>
    <div class="alt-grid">
      ${alts.map(c=>`
        <div class="alt-card" onclick="selectCocktail('${c.id}')">
          <div class="alt-emoji">${c.emoji}</div>
          <div class="alt-info">
            <div class="alt-name">${c.name}</div>
            <div class="alt-sub">${c.base} · ${c.occasion.join(', ')}</div>
          </div>
          <div>
            <div class="alt-pct">${c.match}%</div>
            <div class="alt-pct-lbl">Match</div>
          </div>
        </div>`).join('')}
    </div>`:''}
  `;
}

function renderIngredients(c) {
  return `
    <ul class="ingredient-list">
      ${c.ingredients.map(i=>`
        <li class="ingredient-item">
          <span class="ingredient-name">${i.name}</span>
          <span class="ingredient-amount">${i.amount}</span>
        </li>`).join('')}
    </ul>
    <div class="glass-garnish">
      <div class="gg-item"><div class="gg-label">🥃 Glas</div><div class="gg-val">${c.glass}</div></div>
      <div class="gg-item"><div class="gg-label">🌿 Garnitur</div><div class="gg-val">${c.garnish}</div></div>
    </div>`;
}

function renderSteps(c) {
  return `<ol class="steps-list">
    ${c.steps.map((s,i)=>`
      <li class="step-item">
        <div class="step-num">${i+1}</div>
        <div class="step-text">${s}</div>
      </li>`).join('')}
  </ol>`;
}

/* =============================================================
   EVENT HANDLERS
============================================================= */
function onSlider(el) {
  const v = +el.value;
  S.sliders[el.dataset.key] = v;
  el.style.setProperty('--val', v+'%');
  document.getElementById('sv-'+el.dataset.key).textContent = v;
  run();
}

function toggleSpirit(sp) {
  const i = S.activeSpirits.indexOf(sp);
  i>=0 ? S.activeSpirits.splice(i,1) : S.activeSpirits.push(sp);
  renderFilters();
  run();
}

function toggleOccasion(o) {
  const i = S.activeOccasions.indexOf(o);
  i>=0 ? S.activeOccasions.splice(i,1) : S.activeOccasions.push(o);
  renderFilters();
  run();
}

document.getElementById('nonAlcoholicToggle').addEventListener('change',function(){
  S.nonAlcoholic = this.checked;
  if (S.nonAlcoholic) { S.activeSpirits=[]; renderFilters(); }
  run();
});

document.getElementById('findBtn').addEventListener('click', run);

document.getElementById('resetBtn').addEventListener('click',()=>{
  S.sliders = {sweetness:50,acidity:50,bitterness:50,alcoholStrength:50,fruitiness:50,herbSpice:50};
  S.activeSpirits=[]; S.activeOccasions=[]; S.nonAlcoholic=false; S.selected=null;
  document.getElementById('nonAlcoholicToggle').checked=false;
  renderSliders(); renderFilters(); run();
});

function selectCocktail(id) {
  S.selected=id; S.tab='ingredients';
  renderResults();
  document.getElementById('resultsContent').scrollIntoView({behavior:'smooth',block:'start'});
}

function switchTab(t) { S.tab=t; renderResults(); }

/* =============================================================
   CORE
============================================================= */
function run() {
  S.results = computeResults();
  if (S.selected && !S.results.find(c=>c.id===S.selected)) S.selected=null;
  renderResults();
}

/* =============================================================
   INIT
============================================================= */
renderSliders();
renderFilters();
run();
</script>
